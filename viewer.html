<!DOCTYPE html>
<html>
<head>
  <title>LiveKit Viewer</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://unpkg.com/livekit-client@1.3.3/dist/livekit-client.umd.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #222; color: #fff; }
    video { width: 640px; height: 480px; background: #000; display: block; margin: 10px; border: 2px solid #0f0; order: 1; }
    .track { margin: 10px; padding: 10px; border: 1px solid #666; display: flex; flex-direction: column; }
    audio { width: 640px; display: block; margin: 5px 10px 10px 10px; order: 2; }
    #log { margin-top: 20px; padding: 10px; background: #333; font-size: 12px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>LiveKit Viewer</h1>
  <input id="room" value="myroom">
  <input id="name" value="viewer">
  <button onclick="join()">Join</button>
  <button onclick="leave()" disabled>Leave</button>
  <div id="tracks"></div>
  <div id="log">Ready...</div>

  <script>
    var room;
    var logged = [];

    function log(msg) {
      logged.push(msg);
      var line = '[' + logged.length + '] ' + msg;
      document.getElementById('log').textContent = line + '\n' + document.getElementById('log').textContent;
      console.log(msg);
    }
    
    async function join() {
      logged = [];
      log('Getting token...');
      
      var resp = await fetch('http://127.0.0.1:3000/getToken', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          room: document.getElementById('room').value,
          identity: document.getElementById('name').value
        })
      });
      var data = await resp.json();
      if (!data.token) { log('ERROR: No token'); return; }
      log('Token OK, creating Room...');

      room = new LivekitClient.Room();

      // Log ALL events
      room.on('connected', function() { log('=== CONNECTED ==='); });
      room.on('disconnected', function() { log('=== DISCONNECTED ==='); });
      room.on('reconnecting', function() { log('--- RECONNECTING ---'); });
      room.on('reconnected', function() { log('=== RECONNECTED ==='); });

      room.on('trackSubscribed', function(track, pub, participant) {
        log('>>> SUBSCRIBED: ' + track.kind + ' from ' + participant.identity);
        log('    track.mimeType: ' + track.mimeType);

        var partDiv = document.getElementById('p-' + participant.identity);
        if (!partDiv) {
          partDiv = document.createElement('div');
          partDiv.id = 'p-' + participant.identity;
          partDiv.className = 'track';
          var nameEl = document.createElement('strong');
          nameEl.textContent = participant.identity;
          partDiv.appendChild(nameEl);
          document.getElementById('tracks').appendChild(partDiv);
        }

        var existingVideo = partDiv.querySelector('video');
        var videoEl;
        if (track.kind === 'video') {
          if (existingVideo) {
            videoEl = existingVideo;
          } else {
            videoEl = document.createElement('video');
            videoEl.autoplay = true;
            videoEl.controls = true;
            videoEl.muted = true;
            videoEl.playsInline = true;
            partDiv.appendChild(videoEl);
          }
          track.attach(videoEl);
        } else if (track.kind === 'audio') {
          var audioEl = document.createElement('audio');
          audioEl.controls = true;
          if (existingVideo) {
            partDiv.insertBefore(audioEl, existingVideo.nextSibling);
          } else {
            partDiv.appendChild(audioEl);
          }
          track.attach(audioEl);
        }
        log('    attached: YES');
      });
      
      room.on('trackUnsubscribed', function(track, pub, participant) {
        log('<<< UNSUBSCRIBED: ' + track.kind);
      });
      
      room.on('trackSubscriptionFailed', function(trackSid, error, participant) {
        log('!!! SUBSCRIPTION FAILED: ' + error);
      });

      room.on('participantJoined', function(p) { log('+ joined: ' + p.identity); });
      room.on('participantLeft', function(p) { log('- left: ' + p.identity); });

      log('Connecting to ws://127.0.0.1:7880...');
      try {
        await room.connect('ws://127.0.0.1:7880', data.token);
        log('Connected! Remote participants: ' + room.participants.size);

        // Force subscribe to all remote tracks
        log('Checking existing participants...');
        for (var identity in room.participants) {
          var p = room.participants[identity];
          log('  Participant: ' + p.identity + ', tracks: ' + p.tracks.size);
          for (var trackId in p.tracks) {
            var pub = p.tracks[trackId];
            log('    Track: ' + pub.trackKind + ', subscribed: ' + pub.isSubscribed);
            if (!pub.isSubscribed && pub.trackKind === 'video') {
              log('    Manually subscribing to video...');
              p.subscribeToTrack(pub.trackSid).then(function() {
                log('    Subscribe success!');
              }).catch(function(e) {
                log('    Subscribe failed: ' + e.message);
              });
            }
          }
        }
      } catch (e) {
        log('ERROR: ' + e.message);
      }

      document.querySelectorAll('button')[0].disabled = true;
      document.querySelectorAll('button')[1].disabled = false;
    }

    function leave() {
      if (room) {
        room.disconnect();
        document.getElementById('tracks').innerHTML = '';
        document.querySelectorAll('button')[0].disabled = false;
        document.querySelectorAll('button')[1].disabled = true;
        log('Left');
      }
    }
  </script>
</body>
</html>
